---
vnc_display: 1
vnc_port: 5901
vnc_geometry: "1920x1080"
vnc_user: root
vnc_home: "/{{ 'root' if vnc_user == 'root' else 'home/' + vnc_user }}"

copr_repo_name: yxwang5db2/go-rhel-10
copr_repo_id: "copr:copr.fedorainfracloud.org:yxwang5db2:go-rhel-10"

firewall_open_ports:
  - "{{ vnc_port }}/tcp"

jumpbox_packages:
  - tigervnc-server
  - xfce4-desktop
  - firewalld
  - firefox
  - xterm

# OKD cluster tooling (P6-02)
okd_version: "4.21.0-okd-scos.8"
okd_release_base_url: "https://github.com/okd-project/okd/releases/download"
cluster_tools_dir: /usr/local/bin

cluster_tools_packages:
  - coreos-installer
