---
- name: Boot delivery via manual upload
  ansible.builtin.include_tasks: manual.yml
  when: boot_method == 'manual'

- name: Boot delivery via Redfish virtual media
  ansible.builtin.include_tasks: redfish.yml
  when: boot_method == 'redfish'

- name: Boot delivery via Hetzner Robot rescue
  ansible.builtin.include_tasks: hetzner.yml
  when: boot_method == 'hetzner'
