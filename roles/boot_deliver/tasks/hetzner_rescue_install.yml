---
# Hetzner boot delivery: coreos-installer install from rescue mode
#
# This bypasses the live ISO phase entirely. Instead of dd'ing an ISO and
# booting it, we run coreos-installer install from the Hetzner rescue system
# to write CoreOS + BIP ignition directly to disk.
#
# CAUTION: The BIP ignition (bootstrap-in-place-for-live-iso.ign) was designed
# for the live ISO environment. Running it on an installed system is less tested
# and may encounter edge cases. See ADR-011 Mode 3b for details.

- name: Validate Hetzner Robot credentials are provided
  ansible.builtin.fail:
    msg: "hetzner_robot_user and hetzner_robot_password must be set for boot_method=hetzner"
  when: hetzner_robot_user | length == 0 or hetzner_robot_password | length == 0
  delegate_to: localhost

- name: Get server info from Hetzner Robot API
  ansible.builtin.uri:
    url: "{{ hetzner_robot_api }}/server/{{ ansible_host }}"
    method: GET
    user: "{{ hetzner_robot_user }}"
    password: "{{ hetzner_robot_password }}"
    force_basic_auth: true
    status_code: 200
  register: _hetzner_server
  delegate_to: localhost

- name: Report target server
  ansible.builtin.debug:
    msg: "Hetzner server {{ ansible_host }} (DC: {{ _hetzner_server.json.server.dc }}, status: {{ _hetzner_server.json.server.status }}) -- rescue_install mode"

- name: Activate rescue mode via Hetzner Robot API
  ansible.builtin.uri:
    url: "{{ hetzner_robot_api }}/boot/{{ ansible_host }}/rescue"
    method: POST
    user: "{{ hetzner_robot_user }}"
    password: "{{ hetzner_robot_password }}"
    force_basic_auth: true
    body_format: form-urlencoded
    body:
      os: "{{ hetzner_rescue_os }}"
      arch: "64"
      authorized_key[]: "{{ hetzner_ssh_key_fingerprint }}"
    status_code: 200
  register: _rescue_activate
  delegate_to: localhost

- name: Hardware reset server to boot into rescue
  ansible.builtin.uri:
    url: "{{ hetzner_robot_api }}/reset/{{ ansible_host }}"
    method: POST
    user: "{{ hetzner_robot_user }}"
    password: "{{ hetzner_robot_password }}"
    force_basic_auth: true
    body_format: form-urlencoded
    body:
      type: hw
    status_code: 200
  delegate_to: localhost

- name: Wait for server to go down (confirm reboot started)
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: 22
    timeout: 120
    delay: 5
    state: stopped
  delegate_to: localhost
  failed_when: false

- name: Wait for rescue system to become reachable via SSH
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: 22
    timeout: "{{ hetzner_rescue_wait_timeout }}"
    delay: 10
    state: started
  delegate_to: localhost

- name: Wait for rescue SSH to fully initialize
  ansible.builtin.pause:
    seconds: 15

- name: Verify rescue system is running
  ansible.builtin.command:
    cmd: >-
      ssh {{ hetzner_ssh_opts }} root@{{ ansible_host }} cat /etc/hostname
  register: _rescue_hostname
  delegate_to: localhost
  changed_when: false

- name: Report rescue system status
  ansible.builtin.debug:
    msg: "Rescue system ready: {{ _rescue_hostname.stdout | trim }}"

# ── Pre-install validation ────────────────────────────────────────────

- name: Get openshift-install release image reference
  ansible.builtin.command:
    cmd: openshift-install version
  delegate_to: localhost
  register: _oi_version
  changed_when: false

- name: Parse release image from openshift-install output
  ansible.builtin.set_fact:
    _release_image: >-
      {{ _oi_version.stdout_lines
         | select('match', '.*release image.*')
         | first
         | regex_replace('^.*release image\s+', '') }}

- name: Verify release image manifest exists in registry
  ansible.builtin.command:
    cmd: >-
      podman pull --quiet {{ _release_image }}
  delegate_to: localhost
  register: _pre_pull_check
  changed_when: false
  retries: 2
  delay: 10
  until: _pre_pull_check.rc == 0
  failed_when: false

- name: ABORT if release image cannot be pulled (disks untouched)
  ansible.builtin.fail:
    msg: >-
      ABORT: Release image {{ _release_image }} cannot be pulled.
      Disks have NOT been touched -- server is still in rescue and recoverable.
  when: _pre_pull_check.rc is not defined or _pre_pull_check.rc != 0

# ── Install coreos-installer and run from rescue ──────────────────────

- name: Download coreos-installer binary to rescue system
  ansible.builtin.command:
    cmd: >-
      ssh {{ hetzner_ssh_opts }} root@{{ ansible_host }}
      bash -c 'curl -sL -o /usr/local/bin/coreos-installer
      https://mirror.openshift.com/pub/openshift-v4/clients/coreos-installer/latest/coreos-installer_amd64
      && chmod +x /usr/local/bin/coreos-installer'
  delegate_to: localhost
  changed_when: true

- name: Download BIP ignition to rescue system
  ansible.builtin.command:
    cmd: >-
      ssh {{ hetzner_ssh_opts }} root@{{ ansible_host }}
      wget -q -O /tmp/bip.ign
      http://{{ jumpbox_ip }}:{{ config_serve_port }}/ignition/bootstrap-in-place-for-live-iso.ign
  delegate_to: localhost
  changed_when: true

- name: Wipe all disks to ensure clean state
  ansible.builtin.shell: |
    ssh {{ hetzner_ssh_opts }} root@{{ ansible_host }} \
      'for d in $(lsblk -dnp -o NAME | grep -v loop); do wipefs -af $d; sgdisk --zap-all $d 2>/dev/null; dd if=/dev/zero of=$d bs=1M count=100 conv=notrunc 2>/dev/null; echo "Wiped $d"; done'
  delegate_to: localhost
  changed_when: true

- name: Run coreos-installer install from rescue
  ansible.builtin.command:
    cmd: >-
      ssh {{ hetzner_ssh_opts }} root@{{ ansible_host }}
      coreos-installer install
      -n
      -i /tmp/bip.ign
      {{ hostvars[inventory_hostname].live_iso_device | default(live_iso_device) }}
  delegate_to: localhost
  changed_when: true
  timeout: 900
  register: _ci_result

- name: Report coreos-installer result
  ansible.builtin.debug:
    msg: "coreos-installer install completed on {{ hostvars[inventory_hostname].live_iso_device | default(live_iso_device) }}"

# ── Deactivate rescue and reboot into CoreOS ──────────────────────────

- name: Deactivate rescue mode
  ansible.builtin.uri:
    url: "{{ hetzner_robot_api }}/boot/{{ ansible_host }}/rescue"
    method: DELETE
    user: "{{ hetzner_robot_user }}"
    password: "{{ hetzner_robot_password }}"
    force_basic_auth: true
    status_code: 200
  delegate_to: localhost

- name: Hardware reset server to boot CoreOS from disk
  ansible.builtin.uri:
    url: "{{ hetzner_robot_api }}/reset/{{ ansible_host }}"
    method: POST
    user: "{{ hetzner_robot_user }}"
    password: "{{ hetzner_robot_password }}"
    force_basic_auth: true
    body_format: form-urlencoded
    body:
      type: hw
    status_code: 200
  delegate_to: localhost

- name: Wait for server to go down after reset
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: 22
    timeout: 120
    delay: 5
    state: stopped
  delegate_to: localhost
  failed_when: false

- name: Display bootstrap progress message
  ansible.builtin.debug:
    msg:
      - "============================================="
      - "Server {{ ansible_host }} booting CoreOS from {{ hostvars[inventory_hostname].live_iso_device | default(live_iso_device) }}."
      - "BIP ignition will fire on the installed system."
      - "install-to-disk will write the final OS to {{ hostvars[inventory_hostname].installation_disk | default(installation_disk) }}."
      - "The bootstrap-in-place process will take ~30-45 minutes."
      - "NOTE: This is the rescue_install path (BIP on installed system)."
      - "============================================="

- name: Wait for CoreOS node to become reachable via SSH
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: "{{ boot_ssh_port }}"
    timeout: "{{ boot_wait_timeout }}"
    delay: 60
    state: started
  register: _ssh_wait
  failed_when: false
  delegate_to: localhost

- name: Verify CoreOS booted (not rescue or old OS)
  ansible.builtin.command:
    cmd: >-
      ssh {{ hetzner_ssh_opts }} core@{{ ansible_host }}
      cat /etc/os-release
  delegate_to: localhost
  register: _coreos_check
  changed_when: false
  failed_when: "'CoreOS' not in _coreos_check.stdout"
  when: _ssh_wait.state is defined and _ssh_wait.state == 'started'

- name: Report post-boot status
  ansible.builtin.debug:
    msg: >-
      {% if _ssh_wait.state is defined and _ssh_wait.state == 'started' %}
      CoreOS booted via rescue_install path.
      CoreOS: {{ 'OK' if 'CoreOS' in (_coreos_check.stdout | default('')) else 'FAILED' }}
      {% else %}
      WARNING: Node {{ inventory_hostname }} did not become reachable within {{ boot_wait_timeout }}s.
      Check server console via Hetzner Robot panel or KVM.
      {% endif %}
