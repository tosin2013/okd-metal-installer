---
- name: Validate Hetzner Robot credentials are provided
  ansible.builtin.fail:
    msg: "hetzner_robot_user and hetzner_robot_password must be set for boot_method=hetzner"
  when: hetzner_robot_user | length == 0 or hetzner_robot_password | length == 0
  delegate_to: localhost

- name: Get server info from Hetzner Robot API
  ansible.builtin.uri:
    url: "{{ hetzner_robot_api }}/server/{{ ansible_host }}"
    method: GET
    user: "{{ hetzner_robot_user }}"
    password: "{{ hetzner_robot_password }}"
    force_basic_auth: true
    status_code: 200
  register: _hetzner_server
  delegate_to: localhost

- name: Report target server
  ansible.builtin.debug:
    msg: "Hetzner server {{ ansible_host }} (DC: {{ _hetzner_server.json.server.dc }}, status: {{ _hetzner_server.json.server.status }})"

- name: Activate rescue mode via Hetzner Robot API
  ansible.builtin.uri:
    url: "{{ hetzner_robot_api }}/boot/{{ ansible_host }}/rescue"
    method: POST
    user: "{{ hetzner_robot_user }}"
    password: "{{ hetzner_robot_password }}"
    force_basic_auth: true
    body_format: form-urlencoded
    body:
      os: "{{ hetzner_rescue_os }}"
      arch: "64"
      authorized_key[]: "{{ hetzner_ssh_key_fingerprint }}"
    status_code: 200
  register: _rescue_activate
  delegate_to: localhost

- name: Report rescue activation
  ansible.builtin.debug:
    msg: "Rescue activated for {{ ansible_host }} with SSH key {{ hetzner_ssh_key_fingerprint }}"

- name: Hardware reset server to boot into rescue
  ansible.builtin.uri:
    url: "{{ hetzner_robot_api }}/reset/{{ ansible_host }}"
    method: POST
    user: "{{ hetzner_robot_user }}"
    password: "{{ hetzner_robot_password }}"
    force_basic_auth: true
    body_format: form-urlencoded
    body:
      type: hw
    status_code: 200
  register: _hw_reset
  delegate_to: localhost

- name: Wait for server to go down (confirm reboot started)
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: 22
    timeout: 120
    delay: 5
    state: stopped
  delegate_to: localhost
  failed_when: false

- name: Wait for rescue system to become reachable via SSH
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: 22
    timeout: "{{ hetzner_rescue_wait_timeout }}"
    delay: 10
    state: started
  delegate_to: localhost

- name: Wait for rescue SSH to fully initialize
  ansible.builtin.pause:
    seconds: 15

- name: Verify rescue system is running
  ansible.builtin.command:
    cmd: >-
      ssh {{ hetzner_ssh_opts }} root@{{ ansible_host }} cat /etc/hostname
  register: _rescue_hostname
  delegate_to: localhost
  changed_when: false

- name: Report rescue system status
  ansible.builtin.debug:
    msg: "Rescue system ready: {{ _rescue_hostname.stdout | trim }}"

- name: Discover all disk devices in rescue
  ansible.builtin.command:
    cmd: >-
      ssh {{ hetzner_ssh_opts }} root@{{ ansible_host }}
      lsblk -dnp -o NAME,SIZE,TYPE
  register: _rescue_disks
  delegate_to: localhost
  changed_when: false

- name: Report discovered disks
  ansible.builtin.debug:
    msg: "{{ _rescue_disks.stdout_lines }}"

# ── Download ISO first (before wipe, so we can validate) ──────────────

- name: Download customized ISO to rescue system
  ansible.builtin.command:
    cmd: >-
      ssh {{ hetzner_ssh_opts }} root@{{ ansible_host }}
      wget -q --show-progress -O /tmp/node.iso
      http://{{ jumpbox_ip }}:{{ config_serve_port }}/iso/{{ inventory_hostname }}.iso
  delegate_to: localhost
  changed_when: true

# ── Pre-dd validation (fail early, before touching disks) ─────────────

- name: Get openshift-install release image reference
  ansible.builtin.command:
    cmd: openshift-install version
  delegate_to: localhost
  register: _oi_version
  changed_when: false

- name: Parse release image from openshift-install output
  ansible.builtin.set_fact:
    _release_image: >-
      {{ _oi_version.stdout_lines
         | select('match', '.*release image.*')
         | first
         | regex_replace('^.*release image\s+', '') }}

- name: Report release image to validate
  ansible.builtin.debug:
    msg: "Release image: {{ _release_image }}"

- name: Verify release image manifest exists in registry
  ansible.builtin.command:
    cmd: >-
      podman pull --quiet {{ _release_image }}
  delegate_to: localhost
  register: _pre_pull_check
  changed_when: false
  retries: 2
  delay: 10
  until: _pre_pull_check.rc == 0
  failed_when: false

- name: ABORT if release image cannot be pulled (disks untouched)
  ansible.builtin.fail:
    msg: >-
      ABORT: Release image {{ _release_image }} cannot be pulled.
      Error: {{ _pre_pull_check.stderr | default('unknown') | trim }}.
      Disks have NOT been wiped -- server is still in rescue and recoverable.
      Fix: upgrade openshift-install to a version with a valid release image.
  when: _pre_pull_check.rc is not defined or _pre_pull_check.rc != 0

- name: Pre-dd validation passed
  ansible.builtin.debug:
    msg:
      - "--- Pre-DD Validation PASSED ---"
      - "  Release image: {{ _release_image }} is pullable"
      - "  Safe to proceed with disk wipe and dd."
      - "--------------------------------"

# ── Wipe disks and write ISO ──────────────────────────────────────────

- name: Wipe all disks to ensure clean boot state
  ansible.builtin.shell: |
    ssh {{ hetzner_ssh_opts }} root@{{ ansible_host }} \
      'for d in $(lsblk -dnp -o NAME | grep -v loop); do wipefs -af $d; sgdisk --zap-all $d 2>/dev/null; dd if=/dev/zero of=$d bs=1M count=100 conv=notrunc 2>/dev/null; echo "Wiped $d"; done'
  delegate_to: localhost
  changed_when: true

- name: Write ISO to live boot disk on target server
  ansible.builtin.command:
    cmd: >-
      ssh {{ hetzner_ssh_opts }} root@{{ ansible_host }}
      dd if=/tmp/node.iso of={{ hostvars[inventory_hostname].live_iso_device | default(live_iso_device) }} bs=4M
  delegate_to: localhost
  changed_when: true
  timeout: 600
  register: _dd_result

- name: Sync disk writes on target server
  ansible.builtin.command:
    cmd: >-
      ssh {{ hetzner_ssh_opts }} root@{{ ansible_host }} sync
  delegate_to: localhost
  changed_when: false

- name: Report dd result
  ansible.builtin.debug:
    msg: >-
      ISO written to {{ hostvars[inventory_hostname].live_iso_device | default(live_iso_device) }}
      (BIP install-to-disk target: {{ hostvars[inventory_hostname].installation_disk | default(installation_disk) }}):
      {{ _dd_result.stderr_lines | last | default('done') }}

# ── Deactivate rescue and reboot into CoreOS ──────────────────────────

- name: Deactivate rescue mode
  ansible.builtin.uri:
    url: "{{ hetzner_robot_api }}/boot/{{ ansible_host }}/rescue"
    method: DELETE
    user: "{{ hetzner_robot_user }}"
    password: "{{ hetzner_robot_password }}"
    force_basic_auth: true
    status_code: 200
  delegate_to: localhost

- name: Hardware reset server to boot CoreOS from disk
  ansible.builtin.uri:
    url: "{{ hetzner_robot_api }}/reset/{{ ansible_host }}"
    method: POST
    user: "{{ hetzner_robot_user }}"
    password: "{{ hetzner_robot_password }}"
    force_basic_auth: true
    body_format: form-urlencoded
    body:
      type: hw
    status_code: 200
  delegate_to: localhost

- name: Wait for server to go down after reset
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: 22
    timeout: 120
    delay: 5
    state: stopped
  delegate_to: localhost
  failed_when: false

- name: Display bootstrap progress message
  ansible.builtin.debug:
    msg:
      - "============================================="
      - "Server {{ ansible_host }} is now booting CoreOS live ISO from {{ hostvars[inventory_hostname].live_iso_device | default(live_iso_device) }}."
      - "BIP will bootstrap in the live environment, then install-to-disk"
      - "will write the final OS to {{ hostvars[inventory_hostname].installation_disk | default(installation_disk) }}."
      - "The bootstrap-in-place process will take ~30-45 minutes."
      - "============================================="

- name: Wait for CoreOS node to become reachable via SSH
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: "{{ boot_ssh_port }}"
    timeout: "{{ boot_wait_timeout }}"
    delay: 60
    state: started
  register: _ssh_wait
  failed_when: false
  delegate_to: localhost

# ── Post-boot validation ─────────────────────────────────────────────

- name: Verify CoreOS booted (not rescue or old OS)
  ansible.builtin.command:
    cmd: >-
      ssh {{ hetzner_ssh_opts }} core@{{ ansible_host }}
      cat /etc/os-release
  delegate_to: localhost
  register: _coreos_check
  changed_when: false
  failed_when: "'CoreOS' not in _coreos_check.stdout"
  when: _ssh_wait.state is defined and _ssh_wait.state == 'started'

- name: Verify ignition was applied on booted system
  ansible.builtin.command:
    cmd: >-
      ssh {{ hetzner_ssh_opts }} core@{{ ansible_host }}
      sudo cat /etc/.ignition-result.json
  delegate_to: localhost
  register: _ignition_check
  changed_when: false
  failed_when: _ignition_check.rc != 0
  when: _ssh_wait.state is defined and _ssh_wait.state == 'started'

- name: Verify release image is pullable from booted node
  ansible.builtin.command:
    cmd: >-
      ssh {{ hetzner_ssh_opts }} core@{{ ansible_host }}
      sudo podman pull --quiet {{ _release_image }}
  delegate_to: localhost
  register: _post_pull_check
  changed_when: false
  retries: 3
  delay: 15
  until: _post_pull_check.rc == 0
  failed_when: false
  when: _ssh_wait.state is defined and _ssh_wait.state == 'started'

- name: Report post-boot validation
  ansible.builtin.debug:
    msg: >-
      {% if _ssh_wait.state is defined and _ssh_wait.state == 'started' %}
      POST-BOOT VALIDATION:
        CoreOS: {{ 'OK' if 'CoreOS' in (_coreos_check.stdout | default('')) else 'FAILED' }}
        Ignition: {{ 'OK' if (_ignition_check.rc | default(1)) == 0 else 'FAILED' }}
        Release image pull: {{ 'OK' if (_post_pull_check.rc | default(1)) == 0 else 'FAILED' }}
      {% else %}
      WARNING: Node {{ inventory_hostname }} did not become reachable within {{ boot_wait_timeout }}s.
      Check server console via Hetzner Robot panel or KVM.
      {% endif %}
