---
- name: Ensure certificate backup directory exists
  ansible.builtin.file:
    path: "{{ certmanager_certs_backup_dir }}"
    state: directory
    mode: "0700"

- name: Export and strip apps wildcard TLS secret
  ansible.builtin.shell:
    cmd: >-
      oc get secret apps-wildcard-tls -n openshift-ingress -o yaml |
      python3 -c "
      import yaml, sys;
      d = yaml.safe_load(sys.stdin.read());
      d['metadata'] = {k: d['metadata'][k] for k in ('name', 'namespace') if k in d['metadata']};
      print(yaml.dump(d, default_flow_style=False))
      "
  environment:
    KUBECONFIG: "{{ _kubeconfig }}"
  register: _apps_clean
  changed_when: false

- name: Write apps wildcard cert backup
  ansible.builtin.copy:
    content: "{{ _apps_clean.stdout }}"
    dest: "{{ certmanager_certs_backup_dir }}/apps-wildcard-tls.yaml"
    mode: "0600"

- name: Export and strip API TLS secret
  ansible.builtin.shell:
    cmd: >-
      oc get secret api-tls -n openshift-config -o yaml |
      python3 -c "
      import yaml, sys;
      d = yaml.safe_load(sys.stdin.read());
      d['metadata'] = {k: d['metadata'][k] for k in ('name', 'namespace') if k in d['metadata']};
      print(yaml.dump(d, default_flow_style=False))
      "
  environment:
    KUBECONFIG: "{{ _kubeconfig }}"
  register: _api_clean
  changed_when: false
  when: certmanager_issue_api_cert | bool

- name: Write API cert backup
  ansible.builtin.copy:
    content: "{{ _api_clean.stdout }}"
    dest: "{{ certmanager_certs_backup_dir }}/api-tls.yaml"
    mode: "0600"
  when: certmanager_issue_api_cert | bool

- name: Report certificate backup location
  ansible.builtin.debug:
    msg: >-
      Certificates backed up to {{ certmanager_certs_backup_dir }}/
      (apps-wildcard-tls.yaml{{ ', api-tls.yaml' if certmanager_issue_api_cert | bool else '' }}).
      These can be restored on redeployment with certmanager_restore_certs=true.
