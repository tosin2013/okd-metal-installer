---
- name: Create cert-manager namespace
  ansible.builtin.command:
    cmd: oc apply -f -
    stdin: "{{ lookup('template', 'namespace.yml.j2') }}"
  environment:
    KUBECONFIG: "{{ _kubeconfig }}"
  register: _ns_result
  changed_when: "'created' in _ns_result.stdout"

- name: Create OperatorGroup
  ansible.builtin.command:
    cmd: oc apply -f -
    stdin: "{{ lookup('template', 'operatorgroup.yml.j2') }}"
  environment:
    KUBECONFIG: "{{ _kubeconfig }}"
  register: _og_result
  changed_when: "'created' in _og_result.stdout"

- name: Create Subscription for community cert-manager
  ansible.builtin.command:
    cmd: oc apply -f -
    stdin: "{{ lookup('template', 'subscription.yml.j2') }}"
  environment:
    KUBECONFIG: "{{ _kubeconfig }}"
  register: _sub_result
  changed_when: "'created' in _sub_result.stdout"

- name: Wait for cert-manager CSV to succeed
  ansible.builtin.command:
    cmd: >-
      oc get csv -n cert-manager
      -o jsonpath='{.items[?(@.spec.displayName=="cert-manager")].status.phase}'
  environment:
    KUBECONFIG: "{{ _kubeconfig }}"
  register: _csv_phase
  until: _csv_phase.stdout == 'Succeeded'
  retries: 30
  delay: 10
  changed_when: false

- name: Wait for cert-manager deployment to be available
  ansible.builtin.command:
    cmd: >-
      oc wait --for=condition=Available deployment/cert-manager
      -n cert-manager --timeout={{ certmanager_operator_wait_timeout }}s
  environment:
    KUBECONFIG: "{{ _kubeconfig }}"
  changed_when: false

- name: Wait for cert-manager-webhook deployment to be available
  ansible.builtin.command:
    cmd: >-
      oc wait --for=condition=Available deployment/cert-manager-webhook
      -n cert-manager --timeout={{ certmanager_operator_wait_timeout }}s
  environment:
    KUBECONFIG: "{{ _kubeconfig }}"
  changed_when: false

- name: Wait for cert-manager-cainjector deployment to be available
  ansible.builtin.command:
    cmd: >-
      oc wait --for=condition=Available deployment/cert-manager-cainjector
      -n cert-manager --timeout={{ certmanager_operator_wait_timeout }}s
  environment:
    KUBECONFIG: "{{ _kubeconfig }}"
  changed_when: false

- name: Report cert-manager operator status
  ansible.builtin.debug:
    msg: "Community cert-manager operator installed and ready"
