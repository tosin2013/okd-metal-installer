---
- name: Wait for router to serve new certificate
  ansible.builtin.pause:
    seconds: 10

- name: Check console TLS certificate issuer
  ansible.builtin.command:
    cmd: >-
      bash -c 'echo | openssl s_client
      -connect console-openshift-console.apps.{{ cluster_name }}.{{ base_domain }}:443
      -servername console-openshift-console.apps.{{ cluster_name }}.{{ base_domain }}
      2>/dev/null | openssl x509 -noout -issuer 2>/dev/null || echo "issuer=UNKNOWN"'
  register: _cert_issuer
  changed_when: false
  failed_when: false

- name: Check console HTTP response
  ansible.builtin.uri:
    url: "https://console-openshift-console.apps.{{ cluster_name }}.{{ base_domain }}"
    validate_certs: "{{ not (certmanager_use_staging | bool) }}"
    status_code: [200, 302, 403]
    timeout: 15
  register: _console_http
  failed_when: false

- name: Report certificate verification
  ansible.builtin.debug:
    msg:
      - "--- Certificate Verification ---"
      - "Console URL: https://console-openshift-console.apps.{{ cluster_name }}.{{ base_domain }}"
      - "Certificate issuer: {{ _cert_issuer.stdout | default('unable to check') }}"
      - "Console HTTP status: {{ _console_http.status | default('unreachable') }}"
      - "Staging mode: {{ certmanager_use_staging }}"
      - "{{ 'WARNING: Using staging certificates -- browsers will still show warnings' if certmanager_use_staging else 'Production certificates active -- browsers should trust this connection' }}"
      - "--------------------------------"
