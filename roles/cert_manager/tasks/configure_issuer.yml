---
- name: Read AWS credentials from environment
  ansible.builtin.set_fact:
    _aws_access_key_id: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') }}"
    _aws_secret_access_key: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') }}"
  no_log: true

- name: Validate AWS credentials are available
  ansible.builtin.fail:
    msg: >-
      AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY must be set as environment
      variables. Source your .env file before running the playbook.
  when: _aws_access_key_id | length == 0 or _aws_secret_access_key | length == 0

- name: Validate Route 53 zone ID is configured
  ansible.builtin.fail:
    msg: >-
      route53_zone_id must be set in group_vars/all.yml for DNS-01 challenge.
  when: route53_zone_id | default('') | length == 0

- name: Create AWS credentials Secret in cert-manager namespace
  ansible.builtin.command:
    cmd: oc apply -f -
    stdin: "{{ lookup('template', 'aws-credentials-secret.yml.j2') }}"
  environment:
    KUBECONFIG: "{{ _kubeconfig }}"
  register: _secret_result
  changed_when: "'created' in _secret_result.stdout"
  no_log: true

- name: Create ClusterIssuer
  ansible.builtin.command:
    cmd: oc apply -f -
    stdin: "{{ lookup('template', 'clusterissuer.yml.j2') }}"
  environment:
    KUBECONFIG: "{{ _kubeconfig }}"
  register: _issuer_result
  changed_when: "'created' in _issuer_result.stdout"

- name: Wait for ClusterIssuer to become ready
  ansible.builtin.command:
    cmd: >-
      oc get clusterissuer
      letsencrypt-{{ 'staging' if certmanager_use_staging else 'production' }}
      -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
  environment:
    KUBECONFIG: "{{ _kubeconfig }}"
  register: _issuer_ready
  until: _issuer_ready.stdout == 'True'
  retries: 30
  delay: 10
  changed_when: false

- name: Report ClusterIssuer status
  ansible.builtin.debug:
    msg: >-
      ClusterIssuer letsencrypt-{{ 'staging' if certmanager_use_staging else 'production' }}
      is Ready
