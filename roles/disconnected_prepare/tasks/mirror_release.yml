---
- name: Ensure disconnected output directory exists
  ansible.builtin.file:
    path: "{{ disconnected_output_dir }}"
    state: directory
    mode: "0755"

- name: Check if release has already been mirrored
  ansible.builtin.uri:
    url: "https://{{ mirror_registry_host }}:{{ mirror_registry_port }}/v2/okd/release/tags/list"
    user: "{{ mirror_registry_user }}"
    password: "{{ mirror_registry_password }}"
    force_basic_auth: true
    validate_certs: true
    status_code:
      - 200
      - 404
  register: _mirror_tags
  when: not ansible_check_mode

- name: Mirror OKD release to local registry
  ansible.builtin.command:
    cmd: >-
      oc adm release mirror
      --from={{ okd_release_image }}
      --to={{ mirror_registry_host }}:{{ mirror_registry_port }}/okd/release
      --to-release-image={{ mirror_registry_host }}:{{ mirror_registry_port }}/okd/release:{{ okd_version }}
      --registry-config={{ disconnected_pull_secret_path }}
  register: _mirror_output
  changed_when: true
  when:
    - not ansible_check_mode
    - >-
      _mirror_tags.status | default(404) == 404 or
      okd_version not in (_mirror_tags.json.tags | default([]))
  async: 7200
  poll: 30

- name: Save mirror command output
  ansible.builtin.copy:
    content: "{{ _mirror_output.stdout | default('check mode -- no output') }}"
    dest: "{{ disconnected_output_dir }}/mirror-output.txt"
    mode: "0644"
  when: _mirror_output.stdout is defined

- name: Extract imageContentSources from mirror output
  ansible.builtin.set_fact:
    _image_content_sources:
      - mirrors:
          - "{{ mirror_registry_host }}:{{ mirror_registry_port }}/okd/release"
        source: "quay.io/okd/scos-release"
      - mirrors:
          - "{{ mirror_registry_host }}:{{ mirror_registry_port }}/okd/release"
        source: "quay.io/okd/scos-content"

- name: Write imageContentSources YAML for ignition_generate
  ansible.builtin.copy:
    content: |
      ---
      # Auto-generated by disconnected_prepare mirror_release
      # Feed to ignition_generate via: -e @disconnected-output/image-content-sources.yml
      image_content_sources:
      {{ _image_content_sources | to_nice_yaml(indent=2) | indent(2, first=true) }}
      additional_trust_bundle_path: "{{ mirror_registry_cert_dir }}/registry-ca.crt"
    dest: "{{ disconnected_output_dir }}/image-content-sources.yml"
    mode: "0644"

- name: Set image_content_sources fact for downstream roles
  ansible.builtin.set_fact:
    image_content_sources: "{{ _image_content_sources }}"

- name: Report mirror status
  ansible.builtin.debug:
    msg:
      - "--- Release Mirror Complete ---"
      - "Release: {{ okd_release_image }}"
      - "Mirrored to: {{ mirror_registry_host }}:{{ mirror_registry_port }}/okd/release"
      - "imageContentSources saved to: {{ disconnected_output_dir }}/image-content-sources.yml"
      - "-------------------------------"
