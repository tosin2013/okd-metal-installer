---
- name: Read existing pull secret
  ansible.builtin.slurp:
    src: "{{ pull_secret_path }}"
  register: _original_pull_secret

- name: Build local registry auth entry
  ansible.builtin.set_fact:
    _registry_auth: "{{ (mirror_registry_user ~ ':' ~ mirror_registry_password) | b64encode }}"

- name: Merge local registry credentials into pull secret
  ansible.builtin.set_fact:
    _merged_pull_secret: >-
      {{ _original_pull_secret.content | b64decode | from_json
         | combine({
             'auths': (_original_pull_secret.content | b64decode | from_json).auths
                      | combine({
                          mirror_registry_host ~ ':' ~ mirror_registry_port | string: {
                            'auth': _registry_auth,
                            'email': ''
                          }
                        })
           }, recursive=true)
      }}

- name: Write merged pull secret
  ansible.builtin.copy:
    content: "{{ _merged_pull_secret | to_nice_json }}"
    dest: "{{ disconnected_pull_secret_path }}"
    mode: "0600"

- name: Report merged pull secret
  ansible.builtin.debug:
    msg: "Merged pull secret written to {{ disconnected_pull_secret_path }} (includes {{ mirror_registry_host }}:{{ mirror_registry_port }})"
