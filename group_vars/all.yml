---
cluster_name: okd-metal
base_domain: example.com

# CoreOS variant: fcos or scos (ADR-008)
coreos_variant: scos

# Disconnected mode (ADR-009)
disconnected: false

# Ignition generation (ADR-010)
openshift_install_binary: openshift-install
pull_secret_path: "{{ playbook_dir }}/../pull-secret.json"
ssh_key_path: "~/.ssh/id_rsa.pub"
ignition_output_dir: "{{ playbook_dir }}/../ignition-output"

# Networking defaults (ADR-005)
cluster_network_cidr: "10.128.0.0/14"
cluster_network_host_prefix: 23
service_network_cidr: "172.30.0.0/16"
network_type: OVNKubernetes

# Boot delivery (ADR-011)
boot_method: manual
config_serve_port: 8080

# DNS configuration (ADR-004)
route53_zone_id: ""
dns_ttl: 300

# Disconnected configuration (ADR-009)
mirror_registry_host: ""
mirror_registry_port: 5000
disconnected_pull_secret_path: ""

# VNC configuration (ADR-007)
vnc_display: 1
vnc_port: 5901
vnc_geometry: "1920x1080"
vnc_user: root
