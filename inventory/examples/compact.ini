# Compact OKD cluster inventory
# Topology: 3 masters (schedulable), 0 dedicated workers
# Reference: ADR-003 (Bootstrap-in-Place), ADR-006 (Topology)
#
# Per-host variables (network, BMC) go in host_vars/ directory.
# See: inventory/examples/host_vars/master-0.yml

[masters]
master-0 ansible_host=192.168.1.10
master-1 ansible_host=192.168.1.11
master-2 ansible_host=192.168.1.12

[workers]
# No dedicated workers -- masters are schedulable

[all:vars]
cluster_name=okd-compact
base_domain=example.com
coreos_variant=scos
machine_network_cidr=192.168.1.0/24

[masters:vars]
boot_method=manual
