# Single-Node OKD (SNO) inventory
# Topology: 1 master, 0 workers -- all roles on a single node
# Reference: ADR-003 (Bootstrap-in-Place), ADR-006 (Topology)
#
# Per-host variables (network, BMC) go in host_vars/ directory.
# See: inventory/examples/host_vars/sno-node.yml

[masters]
sno-node ansible_host=192.168.1.10

[workers]
# No workers for SNO -- master runs all workloads

[all:vars]
cluster_name=okd-sno
base_domain=example.com
coreos_variant=scos

[masters:vars]
boot_method=manual
