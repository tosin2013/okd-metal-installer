# Single-Node OKD (SNO) inventory
# Topology: 1 master, 0 workers -- all roles on a single node
# Reference: ADR-003 (Bootstrap-in-Place), ADR-006 (Topology)

[masters]
sno-node ansible_host=192.168.1.10

[workers]
# No workers for SNO -- master runs all workloads

[all:vars]
cluster_name=okd-sno
base_domain=example.com
coreos_variant=scos

[masters:vars]
# boot_method: manual (default) or redfish
boot_method=manual
# For boot_method=redfish, uncomment and set per-host in host_vars:
# bmc_address=192.168.1.110
# bmc_user=admin
# bmc_password=changeme  # Use ansible-vault in production

# Per-host network config (ADR-005)
# machine_network_cidr=192.168.1.0/24
# node_ip=192.168.1.10
# node_gateway=192.168.1.1
# node_dns=192.168.1.1
# node_interface=eno1
