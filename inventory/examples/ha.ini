# Full HA OKD cluster inventory
# Topology: 3 masters + N workers -- production-grade high availability
# Reference: ADR-006 (Topology)

[masters]
master-0 ansible_host=192.168.1.10
master-1 ansible_host=192.168.1.11
master-2 ansible_host=192.168.1.12

[workers]
worker-0 ansible_host=192.168.1.20
worker-1 ansible_host=192.168.1.21

[all:vars]
cluster_name=okd-ha
base_domain=example.com
coreos_variant=scos
machine_network_cidr=192.168.1.0/24

[masters:vars]
boot_method=redfish

[workers:vars]
boot_method=redfish

# Per-host BMC credentials go in host_vars/ directory.
# Example host_vars/master-0.yml:
#   bmc_address: 192.168.1.110
#   bmc_user: admin
#   bmc_password: !vault |
#     $ANSIBLE_VAULT;1.1;AES256
#     ...
#
# Example host_vars/worker-0.yml:
#   bmc_address: 192.168.1.120
#   bmc_user: admin
#   bmc_password: !vault |
#     $ANSIBLE_VAULT;1.1;AES256
#     ...
