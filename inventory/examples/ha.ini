# Full HA OKD cluster inventory
# Topology: 3 masters + N workers -- production-grade high availability
# Reference: ADR-006 (Topology)
#
# Per-host variables (network, BMC) go in host_vars/ directory.
# See: inventory/examples/host_vars/master-0.yml
#      inventory/examples/host_vars/worker-0.yml

[masters]
master-0 ansible_host=192.168.1.10
master-1 ansible_host=192.168.1.11
master-2 ansible_host=192.168.1.12

[workers]
worker-0 ansible_host=192.168.1.20
worker-1 ansible_host=192.168.1.21

[all:vars]
cluster_name=okd-ha
base_domain=example.com
coreos_variant=scos
machine_network_cidr=192.168.1.0/24

[masters:vars]
boot_method=redfish

[workers:vars]
boot_method=redfish
