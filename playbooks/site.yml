---
# OKD-Metal full deployment orchestration
# Usage: ansible-playbook -i inventory/mycluster.ini playbooks/site.yml
#
# Run individual phases with tags:
#   --tags disconnected    Phase 0: mirror registry + release mirror
#   --tags preflight       Phase 1: preflight + ignition generation
#   --tags networking      Phase 2: network configuration
#   --tags iso             Phase 3: ISO customization
#   --tags serve           Phase 4: nginx config server
#   --tags dns             Phase 5: DNS (Route 53 or internal)
#   --tags boot            Phase 6: boot delivery
#   --tags monitor         Phase 7: bootstrap monitoring + validation
#
# Phases executed (when no tags specified, all run in order):
#   0. Disconnected preparation -- mirror registry + release mirror (if disconnected)
#   1. Preflight validation and topology detection (on jumpbox)
#   2. Ignition config generation (on jumpbox)
#   3. Network configuration -- generate .nmconnection files (on jumpbox)
#   4. ISO customization -- build per-host bootable ISOs (on jumpbox)
#   5. Config serving -- nginx HTTP server for Ignition and ISOs (on jumpbox)
#   6. DNS configuration -- Route 53 or internal dnsmasq (on jumpbox)
#   7. Boot delivery to target nodes (manual, Redfish, or Hetzner)
#   8. Bootstrap monitoring and cluster validation (on jumpbox)

- name: "Phase 0: Disconnected preparation (mirror registry + release mirror)"
  hosts: localhost
  connection: local
  gather_facts: true
  become: true
  tags: [disconnected]
  roles:
    - role: disconnected_prepare
      when: disconnected | bool

- name: "Phase 1: Preflight validation and ignition generation"
  hosts: localhost
  connection: local
  gather_facts: true
  become: false
  tags: [preflight]
  roles:
    - preflight
    - ignition_generate

- name: "Phase 2: Generate network configurations"
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  tags: [networking]
  roles:
    - network_configure

- name: "Phase 3: Build custom ISOs"
  hosts: localhost
  connection: local
  gather_facts: true
  become: false
  tags: [iso]
  roles:
    - iso_customize

- name: "Phase 4: Start config HTTP server"
  hosts: localhost
  connection: local
  gather_facts: true
  become: true
  tags: [serve]
  roles:
    - config_serve

- name: "Phase 5a: Configure DNS records (Route 53)"
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  tags: [dns]
  roles:
    - role: dns_configure
      when: not (disconnected | default(false) | bool)

- name: "Phase 5b: Configure internal DNS (disconnected)"
  hosts: localhost
  connection: local
  gather_facts: false
  become: true
  tags: [dns]
  roles:
    - role: dns_internal
      when: disconnected | default(false) | bool

- name: "Phase 6: Boot delivery to cluster nodes"
  hosts: masters:workers
  gather_facts: false
  serial: 1
  tags: [boot]
  roles:
    - boot_deliver

- name: "Phase 7: Monitor bootstrap and validate cluster"
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  tags: [monitor]
  roles:
    - bootstrap_monitor
