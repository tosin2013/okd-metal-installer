---
# OKD-Metal full deployment orchestration
# Usage: ansible-playbook -i inventory/mycluster.ini playbooks/site.yml
#
# Phases executed:
#   1. Preflight validation and topology detection (on jumpbox)
#   2. Ignition config generation (on jumpbox)
#   3. Network configuration -- generate .nmconnection files (on jumpbox)
#   4. ISO customization -- build per-host bootable ISOs (on jumpbox)
#   5. Config serving -- nginx HTTP server for Ignition and ISOs (on jumpbox)
#   6. DNS configuration -- Route 53 record management (on jumpbox)
#   7. Boot delivery to target nodes (manual or Redfish)

- name: "Phase 1: Preflight validation and ignition generation"
  hosts: localhost
  connection: local
  gather_facts: true
  become: false
  roles:
    - preflight
    - ignition_generate

- name: "Phase 2: Generate network configurations"
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  roles:
    - network_configure

- name: "Phase 3: Build custom ISOs"
  hosts: localhost
  connection: local
  gather_facts: true
  become: false
  roles:
    - iso_customize

- name: "Phase 4: Start config HTTP server"
  hosts: localhost
  connection: local
  gather_facts: true
  become: true
  roles:
    - config_serve

- name: "Phase 5: Configure DNS records"
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  roles:
    - dns_configure

- name: "Phase 6: Boot delivery to cluster nodes"
  hosts: masters:workers
  gather_facts: false
  serial: 1
  roles:
    - boot_deliver
